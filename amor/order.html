<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMOR LAB — Program Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --accent: #C6FF33;
      --surface: #121212;
      --surface-2: #181818;
      --line: rgba(255, 255, 255, .1);
      --muted: #9a9a9a;
      --text: #fff
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #080808;
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased
    }

    a {
      color: inherit;
      text-decoration: none
    }

    img {
      display: block;
      max-width: 100%
    }

    button,
    input,
    select,
    textarea {
      font: inherit
    }

    .container {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(8, 8, 8, .86);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, .06)
    }

    .topbar-inner {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px
    }

    .brand {
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 2px
    }

    .back-link {
      color: #bdbdbd;
      font-size: 13px;
      font-weight: 700;
      transition: color .25s
    }

    .back-link:hover {
      color: var(--accent)
    }

    main {
      padding: 56px 0 84px
    }

    .page-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 28px;
      margin-bottom: 28px
    }

    .eyebrow {
      display: inline-block;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px
    }

    h1 {
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 900
    }

    .head-copy {
      max-width: 420px;
      color: var(--muted);
      font-size: 15px
    }

    .order-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 24px;
      align-items: start
    }

    .panel {
      background: linear-gradient(145deg, var(--surface-2), var(--surface));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden
    }

    .panel-section {
      padding: 28px;
      border-bottom: 1px solid rgba(255, 255, 255, .07)
    }

    .panel-section:last-child {
      border-bottom: 0
    }

    .section-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 18px
    }

    .program-card {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px
    }

    .program-thumb {
      aspect-ratio: 1 / 1;
      min-height: 0;
      max-height: 520px;
      border-radius: 8px;
      overflow: hidden;
      background: #222
    }

    .program-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .program-meta {
      display: flex;
      flex-direction: column;
      min-width: 0
    }

    .program-title {
      color: var(--accent);
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .program-desc {
      color: #cfcfcf;
      font-size: 14px;
      white-space: pre-line;
      margin-bottom: 18px
    }

    .facts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: auto
    }

    .fact {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: 8px;
      padding: 12px
    }

    .fact-label {
      color: #777;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .fact-value {
      color: #fff;
      font-size: 13px;
      font-weight: 800
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .field.full {
      grid-column: 1 / -1
    }

    label {
      color: #cfcfcf;
      font-size: 13px;
      font-weight: 700
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      background: rgba(255, 255, 255, .05);
      color: #fff;
      padding: 14px 15px;
      outline: none;
      transition: border-color .2s, box-shadow .2s
    }

    select option {
      color: #111
    }

    textarea {
      min-height: 112px;
      resize: vertical
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(198, 255, 51, .12)
    }

    .payment-list {
      display: grid;
      gap: 10px
    }

    .pay-option {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      padding: 15px;
      background: rgba(255, 255, 255, .035);
      cursor: pointer
    }

    .pay-option:has(input:disabled) {
      opacity: .42;
      cursor: not-allowed
    }

    .pay-option input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent)
    }

    .pay-main {
      font-size: 14px;
      font-weight: 800
    }

    .pay-sub {
      color: #777;
      font-size: 12px
    }

    .bank-account {
      margin-top: 14px;
      border: 1px solid rgba(198, 255, 51, .2);
      border-radius: 8px;
      background: rgba(198, 255, 51, .07);
      padding: 14px 15px
    }

    .bank-account-label {
      color: #aebd75;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 4px
    }

    .bank-account-number {
      color: #fff;
      font-size: 16px;
      font-weight: 900
    }

    .summary {
      position: sticky;
      top: 96px
    }

    .summary-head {
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, .07)
    }

    .summary-program {
      color: var(--accent);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.5;
      margin-bottom: 10px
    }

    .summary-desc {
      color: #999;
      font-size: 13px
    }

    .summary-lines {
      padding: 22px 24px;
      display: grid;
      gap: 12px
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      color: #bdbdbd;
      font-size: 14px
    }

    .summary-line strong {
      color: #fff
    }

    .total {
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, .08);
      align-items: baseline
    }

    .total strong {
      color: var(--accent);
      font-size: 28px;
      font-weight: 900
    }

    .agree {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 0 24px 18px;
      color: #9d9d9d;
      font-size: 12px
    }

    .agree input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      accent-color: var(--accent);
      flex: 0 0 auto
    }

    .order-button {
      width: calc(100% - 48px);
      margin: 0 24px 24px;
      border: 0;
      border-radius: 60px;
      background: var(--accent);
      color: #080808;
      cursor: pointer;
      font-size: 15px;
      font-weight: 900;
      padding: 17px 20px;
      transition: transform .25s, box-shadow .25s, background .25s
    }

    .order-button:hover {
      background: #d4ff5a;
      box-shadow: 0 0 30px rgba(198, 255, 51, .24);
      transform: translateY(-2px)
    }

    .order-button:disabled {
      cursor: wait;
      opacity: .68;
      transform: none;
      box-shadow: none
    }

    .notice {
      display: none;
      margin: 18px 24px 0;
      border: 1px solid rgba(198, 255, 51, .26);
      border-radius: 8px;
      background: rgba(198, 255, 51, .09);
      color: #e6ff9a;
      padding: 14px;
      font-size: 13px
    }

    .error {
      padding: 28px;
      color: #ffb4b4;
      background: rgba(255, 75, 75, .08);
      border: 1px solid rgba(255, 75, 75, .22);
      border-radius: 8px
    }

    @media(max-width:900px) {
      .page-head,
      .order-grid {
        grid-template-columns: 1fr
      }

      .summary {
        position: static
      }
    }

    @media(max-width:640px) {
      .container {
        width: min(100% - 28px, 1120px)
      }

      main {
        padding-top: 36px
      }

      .topbar-inner {
        height: 64px
      }

      .program-card,
      .form-grid,
      .facts {
        grid-template-columns: 1fr
      }

      .program-thumb {
        max-height: none
      }

      .panel-section {
        padding: 22px
      }
    }
  </style>
  <script>
    window.va = window.va || function () {
      (window.vaq = window.vaq || []).push(arguments);
    };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="./index.html">AMOR LAB</a>
      <a class="back-link" href="./index.html#pricing">프로그램 다시 보기</a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-head">
        <div>
          <span class="eyebrow">Program Order</span>
          <h1>프로그램 주문</h1>
        </div>
        <p class="head-copy">선택한 코칭 프로그램 정보를 확인하고 주문자 정보와 결제 방법을 입력해 주세요.</p>
      </div>

      <form class="order-grid" id="orderForm">
        <div class="panel">
          <section class="panel-section">
            <h2 class="section-title">프로그램 정보</h2>
            <div id="programArea">
              <div class="error">프로그램 정보를 불러오는 중입니다.</div>
            </div>
          </section>

          <section class="panel-section">
            <h2 class="section-title">주문자 정보</h2>
            <div class="form-grid">
              <div class="field">
                <label for="buyerName">이름</label>
                <input id="buyerName" name="buyerName" autocomplete="name" required placeholder="홍길동" />
              </div>
              <div class="field">
                <label for="buyerPhone">연락처</label>
                <input id="buyerPhone" name="buyerPhone" autocomplete="tel" required placeholder="010-0000-0000" />
              </div>
              <div class="field full">
                <label for="buyerEmail">이메일</label>
                <input id="buyerEmail" name="buyerEmail" type="email" autocomplete="email" required
                  placeholder="amor@example.com" />
              </div>
              <div class="field full">
                <label for="goal">목표 및 참고 사항</label>
                <textarea id="goal" name="goal" placeholder="현재 기록, 목표 대회, 개선하고 싶은 부분을 적어주세요."></textarea>
              </div>
            </div>
          </section>

          <section class="panel-section">
            <h2 class="section-title">결제 방법</h2>
            <div class="payment-list">
              <label class="pay-option">
                <input type="radio" name="paymentMethod" value="card" disabled />
                <span>
                  <span class="pay-main">신용/체크카드</span><br />
                  <span class="pay-sub">카드 결제 연동 예정</span>
                </span>
              </label>
              <label class="pay-option">
                <input type="radio" name="paymentMethod" value="kakao" disabled />
                <span>
                  <span class="pay-main">카카오페이</span><br />
                  <span class="pay-sub">간편 결제 연동 예정</span>
                </span>
              </label>
              <label class="pay-option">
                <input type="radio" name="paymentMethod" value="bank" checked />
                <span>
                  <span class="pay-main">무통장 입금</span><br />
                  <span class="pay-sub">국민은행 824001-04-091290 · 전준현</span>
                </span>
              </label>
              <div class="bank-account">
                <div class="bank-account-label">입금 계좌</div>
                <div class="bank-account-number">국민은행 824001-04-091290</div>
                <div class="pay-sub">예금주 전준현</div>
              </div>
            </div>
          </section>
        </div>

        <aside class="panel summary" aria-label="주문 요약">
          <div class="summary-head">
            <div class="summary-program" id="summaryTitle">프로그램 선택 중</div>
            <p class="summary-desc" id="summaryDesc">선택된 프로그램의 주문 금액을 확인해 주세요.</p>
          </div>
          <div class="summary-lines">
            <div class="summary-line">
              <span>수강 기간</span>
              <strong id="summaryDuration">-</strong>
            </div>
            <div class="summary-line">
              <span>담당 코치</span>
              <strong id="summaryCoach">-</strong>
            </div>
            <div class="summary-line">
              <span>입금 계좌</span>
              <strong>국민 824001-04-091290 · 전준현</strong>
            </div>
            <div class="summary-line total">
              <span>결제 금액</span>
              <strong id="summaryPrice">-</strong>
            </div>
          </div>
          <label class="agree">
            <input type="checkbox" id="agree" required />
            <span>주문 정보와 결제 진행 안내를 확인했습니다.</span>
          </label>
          <button class="order-button" type="submit" id="orderButton">주문하기</button>
        </aside>
      </form>
    </div>
  </main>

  <script>
    const PROGRAMS = [
      {
        id: '06a42964-2aa4-4287-a724-32fb8526e2df',
        title: '기본 4주반',
        description: '러닝 + 스테이션 통합 기본반입니다. 4주 마지막 대면 미팅 및 레슨 1회가 포함됩니다.',
        thumbnail_url: 'https://sburksnwmywzytpctjws.supabase.co/storage/v1/object/public/content-media/users/c05a1ac7-a8c9-45a4-b074-d35d7955b5bf/program-thumbnail/2026/05/1778500991444-d592c490-3e4d-4564-a6ce-9ab55dc5d611.webp',
        difficulty: 'beginner',

        products: [
          {

            duration_options: [
              {
                duration_months: 1,

        ]
      },
      {
        id: '0d925d9f-bdb1-4e34-ae70-5609faa20983',
        title: '대회준비반',
        description: '4주 클래스입니다. 일주일에 4회 러닝 + 스테이션 프로그램을 제공하며, 2주 간격으로 한 번씩 총 2회 대면 훈련 및 미팅을 진행합니다.',
        thumbnail_url: 'https://sburksnwmywzytpctjws.supabase.co/storage/v1/object/public/content-media/users/c05a1ac7-a8c9-45a4-b074-d35d7955b5bf/program-thumbnail/2026/05/1778501314289-1f69e761-de23-4862-a5bf-ce13e56afd13.webp',
        difficulty: 'intermediate',
        daily_workout_minutes: 60,
        days_per_week: 4,
        display_order: 1,
        coach_name: '전준현',
        products: [
          {
            price_krw: 210000,
            is_active: true,
            duration_options: [
              {
                duration_months: 1,
                price_krw: 210000,
                is_enabled: true
              }
            ]
          }
        ]
      },
      {
        id: '8f81d9f1-8559-4fd8-bbe9-c49779770461',
        title: '러닝 클래스',
        description: '4주 클래스입니다. 일주일에 3회 또는 4회, 러닝 수준과 강도에 따라 프로그램을 제공합니다.',
        thumbnail_url: 'https://sburksnwmywzytpctjws.supabase.co/storage/v1/object/public/content-media/users/c05a1ac7-a8c9-45a4-b074-d35d7955b5bf/program-thumbnail/2026/05/1779512834135-16d1e680-4696-4d6d-8ca2-28c9fc53ca54.webp',
        difficulty: 'intermediate',
        daily_workout_minutes: 60,
        days_per_week: '3~4',
        display_order: 2,
        coach_name: '전준현',
        products: [
          {
            price_krw: 160000,
            is_active: true,
            duration_options: [
              {
                duration_months: 1,
                price_krw: 160000,
                is_enabled: true
              }
            ]
          }
        ]
      },
      {
        id: 'c881344f-267c-4aa4-ad49-008e4275ec1f',
        title: '하이록스 스테이션',
        description: '4주 클래스입니다. 일주일에 3회 프로그램을 제공하며, 스테이션별 목적에 맞는 훈련으로 부족한 구간을 보완합니다.',
        thumbnail_url: 'https://sburksnwmywzytpctjws.supabase.co/storage/v1/object/public/content-media/users/c05a1ac7-a8c9-45a4-b074-d35d7955b5bf/program-thumbnail/2026/05/1779512850686-61fc17d2-7dd9-4961-b0e5-a2f550ab127c.webp',
        difficulty: 'intermediate',
        daily_workout_minutes: 60,
        days_per_week: 3,
        display_order: 3,
        coach_name: '전준현',
        products: [
          {
            price_krw: 140000,
            is_active: true,
            duration_options: [
              {
                duration_months: 1,
                price_krw: 140000,
                is_enabled: true
              }
            ]
          }
        ]
      }
    ];

    const DURATION_OPTIONS = [1, 2, 3].map(months => ({
      duration_months: months,
      price_krw: 0,
      is_enabled: true
    }));

    const SUPABASE_URL = 'https://sburksnwmywzytpctjws.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNidXJrc253bXl3enl0cGN0andzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDA4MDQsImV4cCI6MjA4NzUxNjgwNH0.AamszIdA3WYnGWl-vx1fjI70-QZM-59Ap8MzLAmNB8g';
    const TENANT_ID = '8e4f2364-ddd7-4e65-8238-6951d67b4c42';
    const BANK_ACCOUNT = {
      bankName: '국민은행',
      accountNumber: '824001-04-091290',
      holderName: '전준현'
    };

    const state = {
      programs: PROGRAMS,
      selectedProgram: null,
      selectedDuration: null
    };

    const formatPrice = value => new Intl.NumberFormat('ko-KR', {
      style: 'currency',
      currency: 'KRW',
      maximumFractionDigits: 0
    }).format(value || 0);

    const difficultyLabel = difficulty => ({
      beginner: '입문',
      intermediate: '중급',
      advanced: '상급'
    }[difficulty] || difficulty || '-');

    const enabledDurations = program => {
      const product = program.products?.find(item => item.is_active) || program.products?.[0];
      const monthlyPrice = product?.price_krw || 99000;
      return DURATION_OPTIONS.map(option => ({
        ...option,
        price_krw: monthlyPrice * option.duration_months
      }));
    };

    function renderProgram(program) {
      const durations = enabledDurations(program);
      state.selectedProgram = program;
      state.selectedDuration = durations[0];

      document.getElementById('programArea').innerHTML = `
        <div class="program-card">
          <div class="program-thumb">
            <img src="${program.thumbnail_url || 'record.png'}" alt="${program.title}" />
          </div>
          <div class="program-meta">
            <label for="programSelect">선택 프로그램</label>
            <select id="programSelect" name="programId" style="margin:8px 0 14px">
              ${state.programs.map(item => `<option value="${item.id}" ${item.id === program.id ? 'selected' : ''}>${item.title}</option>`).join('')}
            </select>
            <div class="program-title">${program.title}</div>
            <p class="program-desc">${program.description || ''}</p>
            <div class="field" style="margin-bottom:16px">
              <label for="durationSelect">수강 기간</label>
              <select id="durationSelect" name="duration">
                ${durations.map((item, index) => `<option value="${index}">${item.duration_months}개월 · ${formatPrice(item.price_krw)}</option>`).join('')}
              </select>
            </div>
            <div class="facts">
              <div class="fact">
                <div class="fact-label">난이도</div>
                <div class="fact-value">${difficultyLabel(program.difficulty)}</div>
              </div>
              <div class="fact">
                <div class="fact-label">주간 훈련</div>
                <div class="fact-value">주 ${program.days_per_week || '-'}회</div>
              </div>
              <div class="fact">
                <div class="fact-label">일일 시간</div>
                <div class="fact-value">${program.daily_workout_minutes || '-'}분</div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('programSelect').addEventListener('change', event => {
        const nextProgram = state.programs.find(item => item.id === event.target.value);
        if (nextProgram) {
          const url = new URL(window.location.href);
          url.searchParams.set('program', nextProgram.id);
          window.history.replaceState({}, '', url);
          renderProgram(nextProgram);
        }
      });

      document.getElementById('durationSelect').addEventListener('change', event => {
        state.selectedDuration = durations[Number(event.target.value)];
        renderSummary();
      });

      renderSummary();
    }

    function renderSummary() {
      const program = state.selectedProgram;
      const duration = state.selectedDuration;
      if (!program || !duration) return;

      document.getElementById('summaryTitle').textContent = program.title;
      document.getElementById('summaryDesc').textContent = program.description || '선택된 프로그램입니다.';
      document.getElementById('summaryDuration').textContent = `${duration.duration_months}개월`;
      document.getElementById('summaryCoach').textContent = program.coach_name || '전준현';
      document.getElementById('summaryPrice').textContent = formatPrice(duration.price_krw);
    }

    function loadPrograms() {
      state.programs = PROGRAMS.slice().sort((a, b) => (a.display_order || 0) - (b.display_order || 0));

      const params = new URLSearchParams(window.location.search);
      const requestedId = params.get('program');
      const program = state.programs.find(item => item.id === requestedId) || state.programs[0];

      if (!program) {
        document.getElementById('programArea').innerHTML = '<div class="error">표시할 프로그램이 없습니다.</div>';
        return;
      }

      renderProgram(program);
    }

    document.getElementById('orderForm').addEventListener('submit', async event => {
      event.preventDefault();
      if (!event.currentTarget.reportValidity()) return;

      const form = event.currentTarget;
      const orderButton = document.getElementById('orderButton');
      const formData = new FormData(form);
      const program = state.selectedProgram;
      const duration = state.selectedDuration;

      if (!program || !duration) {
        alert('프로그램 정보를 확인할 수 없습니다. 다시 시도해 주세요.');
        return;
      }

      orderButton.disabled = true;
      orderButton.textContent = '주문 처리 중...';

      try {
        const monthlyPriceKrw = Math.round(duration.price_krw / duration.duration_months);
        const response = await fetch(`${SUPABASE_URL}/functions/v1/create-guest-order`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify({
            tenantId: TENANT_ID,
            buyerName: formData.get('buyerName'),
            buyerPhone: formData.get('buyerPhone'),
            orderPayload: {
              programId: program.id,
              programName: program.title,
              storeName: 'AMOR LAB 랜딩',
              buyerEmail: formData.get('buyerEmail'),
              buyerGoal: formData.get('goal'),
              paymentMethod: formData.get('paymentMethod'),
              monthlyPriceKrw,
              durationMonths: duration.duration_months,
              totalPriceKrw: duration.price_krw,
              bankAccount: BANK_ACCOUNT
            },
          }),
        });

        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.ok) {
          throw new Error(result.error || result.message || '주문 생성에 실패했습니다.');
        }

        alert(`주문이 완료되었습니다.\n입금 계좌: ${BANK_ACCOUNT.bankName} ${BANK_ACCOUNT.accountNumber}\n예금주: ${BANK_ACCOUNT.holderName}`);
        window.location.href = './index.html';
      } catch (error) {
        alert(`주문 처리 중 오류가 발생했습니다.\n${error.message}`);
        orderButton.disabled = false;
        orderButton.textContent = '주문하기';
      }
    });

    loadPrograms();
  </script>
</body>

</html>
